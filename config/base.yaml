# Shared base + serving (§3, §5, §7.2). A single base for all LoRAs.

base_model:
  # Tier A primary (§5). MIT license, STEM reasoning already distilled from R1.
  tier_a: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  # Equivalent alternative (VERIFY):
  tier_a_alt: open-r1/OpenR1-Distill-7B
  # Tier B floor (§3): smaller, fits in 8GB RAM on CPU.
  tier_b: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B

# Reasoning format of the base. VERIFY the exact chat template tag (§6).
reasoning:
  think_open: "<think>"
  think_close: "</think>"

quant:
  gguf_type: q4_k_m          # Tier B floor (§3)

serving:
  # Tier A — vLLM multi-LoRA (§7.2)
  vllm:
    host: "0.0.0.0"
    port: 8000
    max_model_len: 16384
    max_loras: 3
    max_lora_rank: 64
    gpu_memory_utilization: 0.90
    dtype: bfloat16
  base_url: "http://localhost:8000/v1"   # override via env VLLM_BASE_URL

# Served adapter names (must match the outputs of train/) (§6, §7.2)
adapters:
  math: horizon-math-lora
  code: horizon-code-lora
  science: horizon-science-lora
adapter_dir: adapters        # where train_lora.py saves the adapters

# v1.1 (post-gate iteration, measured 2026-07-02): the code specialist SFT on
# competitive-programming makes the base WORSE on HumanEval/MBPP (-5/-1) —
# disabled until it is re-trained on function-completion style. math +6, kept.
specialist_enabled:
  math: true
  code: false
  science: true

# Default generation parameters for the harness (§7).
generation:
  temperature: 0.7           # >0 for self-consistency sampling (§7.3)
  top_p: 0.95
  max_tokens: 8192           # reasoning traces are long
  greedy_temperature: 0.0    # for deterministic single-shot pass@1

# best-of-N (§7.3). N values tested in Fase 1.
best_of_n:
  math_default: 16           # self-consistency (maj@k)
  code_default: 8            # test execution + retry
  n_grid: [8, 16, 32]

# Verifier: advanced options (Fase 7/8)
verifier:
  code_selftests: true       # AUTO-GENERATED tests (CodeT) when public tests are missing (§7.3)
  selftest_suites: 2         # how many assert suites to generate
  math_selector: sc          # sc | prm_weighted_<agg> | prm_argmax_<agg> (after pilot 8b)
  prm_model: Qwen/Qwen2.5-Math-PRM-7B   # runtime PRM; consumer: launch/ThinkPRM-1.5B
  prm_device: cuda           # cpu for local Tier A
  early_stop_sc: false       # Fase 7: stop when the majority is decided (OFF in the baselines)

# Fase 8d: agentic repair loop on the code path (generate→execute→repair).
# OFF in baselines 1-6; baseline 4b turns it on via PipelineConfig.
repair_loop:
  enabled: false             # runtime default (PipelineConfig.use_repair takes precedence)
  initial_k: 2               # initial burst candidates (early-exit if one passes)
  max_iters: 4               # repair iterations with concrete feedback
  # honest budget: initial_k + max_iters <= best_of_n.code_default (§15.2)

# Product runtime (NOT for benchmarks — it would inflate repeated items)
runtime:
  experience_cache: false    # 8c flywheel: pre-generation lookup + add if hard-certified
  cache_threshold: 0.95

# Router (§7.1)
router:
  embedding_model: BAAI/bge-m3      # VERIFY current model
  mode: deep                        # on STEM always route in deep mode
  version: v1                       # v1.2 = CP heuristic (2026-07-04: 59/100 LCB misrouted
                                    # -> fix Input/Output/Constraints markers; FP math 1/230)
                                    # + classifier (90.3% held-out); auto fallback to v0
