# CODE specialist (§4, §6).
specialist: code
output_name: horizon-code-lora

datasets:
  # Dedicated 'code' config (competitive programming, verified R1 traces).
  # Source consistent with the science specialist (same MoT family), 'messages'
  # format handled by the normalizer. 83k rows / ~1.6 GB. (VERIFY §4)
  - id: open-r1/Mixture-of-Thoughts
    config: code
    split: train
  # Multi-domain alternative (needs filtering): open-thoughts/OpenThoughts-114k

subsample: 40000
seed: 42

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none

training:
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 1
  max_seq_length: 16384      # 4090 48GB: long code traces (median ~13k) kept whole; filtered at 16384
  packing: true
  bf16: true
  gradient_checkpointing: true
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  optim: adamw_8bit
  logging_steps: 10
  save_steps: 500

schema:
  problem_field: problem
  solution_field: solution
  answer_field: null                 # for code the "ground truth" is the tests, not a string
