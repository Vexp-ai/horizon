# SCIENCE specialist (§4, §6).
specialist: science
output_name: horizon-science-lora

datasets:
  - id: open-r1/Mixture-of-Thoughts
    config: science            # science subset, verified traces
    split: train
  # - id: nvidia/Llama-Nemotron-Post-Training-Dataset   # science subset (~483k). VERIFY
  #   config: science
  #   split: train

subsample: 40000
seed: 42

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none

training:
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 1
  max_seq_length: 16384      # 4090 48GB: long code traces (median ~13k) kept whole; filtered at 16384
  packing: true
  bf16: true
  gradient_checkpointing: true
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  optim: adamw_8bit
  logging_steps: 10
  save_steps: 500

schema:
  problem_field: problem
  solution_field: solution
  answer_field: answer
